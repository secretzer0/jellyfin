name: Build Docker (fork)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref of THIS repo (jellyfin server) to build"
        required: true
        default: "feature/query-performance-improvements"
      dotnet_version:
        description: ".NET SDK version"
        required: true
        default: "10.0"
      nodejs_version:
        description: "Node.js version (web build)"
        required: true
        default: "20"
      jellyfin_web_ref:
        description: "Ref of jellyfin/jellyfin-web to build"
        required: true
        default: "master"
      jellyfin_version:
        description: "Stamped Jellyfin version string"
        required: true
        default: "10.12.0-pr16062"
      tip_tag:
        description: "Mutable tip tag (e.g. pr16062)"
        required: true
        default: "pr16062"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout jellyfin-packaging
        uses: actions/checkout@v4
        with:
          repository: jellyfin/jellyfin-packaging
          ref: master
          path: packaging

      - name: Checkout jellyfin (this fork)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ inputs.ref }}
          path: packaging/jellyfin-server

      - name: Checkout jellyfin-web
        uses: actions/checkout@v4
        with:
          repository: jellyfin/jellyfin-web
          ref: ${{ inputs.jellyfin_web_ref }}
          path: packaging/jellyfin-web

      - name: Resolve short SHA
        id: sha
        run: echo "short=$(git -C packaging/jellyfin-server rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: packaging
          file: packaging/docker/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            DOTNET_VERSION=${{ inputs.dotnet_version }}
            NODEJS_VERSION=${{ inputs.nodejs_version }}
            PACKAGE_ARCH=amd64
            DOTNET_ARCH=x64
            IMAGE_ARCH=amd64
            TARGET_ARCH=amd64
            JELLYFIN_VERSION=${{ inputs.jellyfin_version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/jellyfin:${{ inputs.tip_tag }}-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/jellyfin:${{ inputs.tip_tag }}
